<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atelier</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid; place-items: center;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #f6f3ee; color: #2b2622;
    }
    .wrap { text-align: center; opacity: 0.85; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
           background: #b4533a; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="font-weight:600;letter-spacing:.02em">Atelier</h1>
    <p>Starting local services <span class="dot"></span></p>
  </div>
</body>
</html>

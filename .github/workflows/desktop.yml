name: Desktop installers

# Build the Atelier desktop app for Linux, macOS and Windows. On a `v*` tag the
# installers are attached to a GitHub Release; manual runs upload them as
# workflow artifacts. See desktop/README.md for the architecture.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/upload the Release on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04     # AppImage glibc compat + webkit2gtk-4.1
          - os: macos-13         # Intel (x86_64) .dmg
          - os: macos-14         # Apple Silicon (arm64) .dmg
          - os: windows-latest   # .msi + NSIS .exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Python deps (sidecar runtime + PyInstaller)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r tools/requirements.txt pyserial pyinstaller

      - name: Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build frontend (static export)
        shell: bash
        working-directory: frontend
        env:
          DESKTOP_EXPORT: "1"
          NEXT_PUBLIC_BACKEND_URL: ""
        run: |
          npm ci
          npm run build

      - name: Bundle Python sidecars (PyInstaller)
        shell: bash
        run: |
          pyinstaller --noconfirm --distpath desktop/dist --workpath desktop/build desktop/pyinstaller/atelier-backend.spec
          pyinstaller --noconfirm --distpath desktop/dist --workpath desktop/build desktop/pyinstaller/atelier-tools.spec
          pyinstaller --noconfirm --onefile --name atelier-launcher \
            --distpath desktop/dist --workpath desktop/build --specpath desktop/build desktop/run_local.py

      - name: Stage sidecars + frontend for Tauri
        shell: bash
        run: python desktop/ci_stage.py

      - name: Tauri build
        shell: bash
        working-directory: desktop/src-tauri
        # macOS code-signing + notarization happens automatically when these are set
        # (empty until you add the secrets, so it's a no-op no-sign build until then).
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: tauri build

      - name: Sign Windows installers (optional)
        # Template for an EXPORTABLE .pfx cert. No-op until you add the secrets.
        # Modern OV/EV certs are HSM-only — for those, swap this for azuresigntool
        # against Azure Trusted Signing / Key Vault (see desktop/README.md).
        if: runner.os == 'Windows'
        shell: bash
        env:
          WIN_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [ -z "${WIN_CERT_BASE64}" ]; then
            echo "No WINDOWS_CERT_BASE64 secret — skipping Windows signing."; exit 0
          fi
          echo "$WIN_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.pfx"
          ST=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name signtool.exe 2>/dev/null | grep -i x64 | sort | tail -1)
          find desktop/src-tauri/target/release/bundle \( -name '*.msi' -o -name '*-setup.exe' \) -print0 |
            while IFS= read -r -d '' f; do
              "$ST" sign //f "$(cygpath -w "$RUNNER_TEMP/cert.pfx")" //p "$WIN_CERT_PASSWORD" \
                //fd sha256 //tr http://timestamp.digicert.com //td sha256 "$(cygpath -w "$f")"
            done
          rm -f "$RUNNER_TEMP/cert.pfx"

      - name: Checksums (SHA256SUMS)
        shell: bash
        run: |
          cd desktop/src-tauri/target/release/bundle
          out="$GITHUB_WORKSPACE/SHA256SUMS-${{ matrix.os }}.txt"
          : > "$out"
          find . -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
            -o -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' \) -print0 |
            while IFS= read -r -d '' f; do
              if command -v sha256sum >/dev/null; then sha256sum "$f"; else shasum -a 256 "$f"; fi
            done | sed 's#\./##' >> "$out"
          cat "$out"

      - name: Upload installers (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: atelier-${{ matrix.os }}
          retention-days: 14
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.rpm
            desktop/src-tauri/target/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*-setup.exe
            SHA256SUMS-${{ matrix.os }}.txt

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: false
          files: |
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.rpm
            desktop/src-tauri/target/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*-setup.exe
            SHA256SUMS-${{ matrix.os }}.txt
